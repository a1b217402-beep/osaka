<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>大阪京都旅行 - 2026</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="關西行">
    <meta name="theme-color" content="#ff9a9e">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>大阪京都旅行</h1>
        <p class="subtitle">8/10~8/17 | 8天7夜</p>
    </header>

    <main>
        <nav>
            <div class="nav-container">
                <button class="nav-btn" onclick="openModal('day1', event)">Day 1</button>
                <button class="nav-btn" onclick="openModal('day2', event)">Day 2</button>
                <button class="nav-btn" onclick="openModal('day3', event)">Day 3</button>
                <button class="nav-btn" onclick="openModal('day4', event)">Day 4</button>
                <button class="nav-btn" onclick="openModal('day5', event)">Day 5</button>
                <button class="nav-btn" onclick="openModal('day6', event)">Day 6</button>
                <button class="nav-btn" onclick="openModal('day7', event)">Day 7</button>
                <button class="nav-btn" onclick="openModal('day8', event)">Day 8</button>
            </div>
        </nav>

        <section class="weather-widget">
            <div class="weather-header">
                <div class="weather-left">
                    <h2 class="city-name" id="location-name">📍 定位中...</h2>
                    <span class="weather-subtitle serif">未來 24 小時預報</span>
                </div>
                <div class="weather-right">
                    <h3 id="current-weather-desc" class="serif">同步中...</h3>
                </div>
            </div>
            <div class="hourly-forecast" id="hourly-forecast"></div>
        </section>

        <section class="hero">
            <div class="hero-card preview-card-content" onclick="openCurrentDayPreview(event)">
                <div class="preview-middle">
                    <span class="current-time serif" id="preview-now-time">--:--</span>
                    <span class="activity-title" id="preview-now-title">讀取行程中...</span>
                    <div class="next-activity-row">
                        <span class="next-activity-arrow">→</span>
                        <span class="next-activity-text" id="preview-next-title">準備出發</span>
                    </div>
                </div>
                <div class="preview-right">
                    <span class="clock-icon">🕒</span>
                    <span class="next-time serif" id="preview-next-time">--:--</span>
                    <span class="next-label">下個時間</span>
                </div>
            </div>
        </section>

        <section class="expense-trigger-section">
            <div class="expense-trigger-card" onclick="openExpenseModal(event)">
                <div class="exp-trig-left">
                    <span class="exp-trig-icon">💰</span>
                    <div class="exp-trig-text">
                        <span class="exp-trig-title">旅行記帳本</span>
                        <span class="exp-trig-sub">Timmy & ㄐㄐ</span>
                    </div>
                </div>
                <div class="exp-trig-right">打開 →</div>
            </div>
        </section>

        <div id="itineraryModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="close-btn" onclick="closeModal()">×</div>
                <div id="modalBody"></div>
            </div>
        </div>

        <div id="expenseModal" class="modal" style="display: none;">
            <div class="modal-content expense-modal-content">
                <div class="close-btn" onclick="closeExpenseModal()">×</div>
                <div class="ios-modal-header"><h2>雙人記帳本</h2></div>
                
                <div class="summary-board">
                    <div class="total-spent">總花費: ¥<span id="total-amount">0</span></div>
                    <div class="split-details">
                        <div class="person"><span class="dot dot-timmy"></span>Timmy 付: ¥<span id="timmy-paid">0</span></div>
                        <div class="person"><span class="dot dot-jj"></span>ㄐㄐ 付: ¥<span id="jj-paid">0</span></div>
                    </div>
                    <div class="settlement" id="settlement-text">目前無須結算</div>
                </div>

                <div class="add-expense-form">
                    <div class="payer-toggle">
                        <input type="radio" id="payer-timmy" name="payer" value="Timmy" checked>
                        <label for="payer-timmy">Timmy 付款</label>
                        <input type="radio" id="payer-jj" name="payer" value="ㄐㄐ">
                        <label for="payer-jj">ㄐㄐ 付款</label>
                    </div>
                    <div class="input-row">
                        <input type="number" id="expense-amount" placeholder="金額 (日幣 ¥)" required>
                    </div>
                    <div class="input-row">
                        <input type="text" id="expense-desc" placeholder="項目 (例: 大喜豬排、地鐵)" required>
                    </div>
                    <button class="add-btn" onclick="addExpense()">➕ 記上一筆</button>
                </div>

                <div class="expense-list-container">
                    <h3>消費明細</h3>
                    <div id="expense-list"></div>
                </div>
            </div>
        </div>

        <div id="data-source" style="display:none;">
            </div>
    </main>

    <footer><p>© 2026 Kansai Adventure | iOS 26 Visuals</p></footer>
    <script src="script.js"></script>
</body>
</html>
